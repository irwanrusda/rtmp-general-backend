worker_processes auto;
rtmp_auto_push on;
env DB_HOST;
env DB_PORT;
env DB_USER;
env DB_PASSWORD;
env DB_NAME;
events {}

rtmp {
    server {
        listen 1935;
        listen [::]:1935 ipv6only=on;

        application live {
            live on;
            record off;

            on_publish http://127.0.0.1:8080/auth;
            on_publish_done http://127.0.0.1:8080/auth_done;

            exec /start.sh transcode $name;
        }

        application hls_out {
            live on;
            record off;

            allow publish 127.0.0.1;
            deny publish all;

            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 6s;
            hls_sync 100ms;
            hls_cleanup on;
        }
    }
}

http {
    default_type application/octet-stream;

    server {
        listen 80;

        # ── CORS Helper (set for all locations) ──────────────────
        set $cors_origin "";
        if ($http_origin ~* "^https?://(rtmp\.nanobyte\.web\.id|localhost(:[0-9]+)?)$") {
            set $cors_origin $http_origin;
        }

        # ── API & Auth endpoints → Go Backend ────────────────────
        location ~ ^/(api|auth|auth_done|migrate) {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
        }

        # ── RTMP Stats (Local Only) ───────────────────────────────
        location /control {
            rtmp_control all;
            allow 127.0.0.1;
            deny all;
        }

        location /stat {
            rtmp_stat all;
            allow 127.0.0.1;
            deny all;
        }

        # ── HLS segments ─────────────────────────────────────────
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
                add_header Content-Type text/plain;
                add_header Content-Length 0;
                return 204;
            }
        }
    }
}
